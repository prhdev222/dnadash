<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 DNA Personal Risk Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d18;--bg2:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.09);
  --text:#e2e8f0;--muted:rgba(255,255,255,0.45);--dim:rgba(255,255,255,0.25);
  --purple:#a78bfa;--blue:#38bdf8;--green:#34d399;--amber:#fbbf24;
  --red:#f87171;--orange:#fb923c;
  --topbar-bg:rgba(8,13,24,0.95);--control-bg:rgba(255,255,255,0.04);--control-active:rgba(167,139,250,0.2);
  --strong:#f1f5f9;--soft:rgba(255,255,255,.68);--hero-panel:linear-gradient(135deg,rgba(167,139,250,.1),rgba(56,189,248,.06));
  --hero-border:rgba(167,139,250,.22);--track:rgba(255,255,255,.07);--glow:rgba(167,139,250,.06);
}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',system-ui,'Noto Sans Thai',sans-serif;min-height:100vh;font-size:15px;line-height:1.6}
body.theme-light{
  --bg:#f6f8fb;--bg2:#ffffff;--border:rgba(15,23,42,.11);--text:#172033;--muted:#64748b;--dim:#8a94a6;
  --purple:#7c3aed;--blue:#0284c7;--green:#059669;--amber:#b45309;--red:#dc2626;--orange:#ea580c;
  --topbar-bg:rgba(248,250,252,.94);--control-bg:rgba(15,23,42,.045);--control-active:rgba(14,165,233,.12);
  --strong:#0f172a;--soft:#475569;--hero-panel:linear-gradient(135deg,rgba(14,165,233,.12),rgba(124,58,237,.06));
  --hero-border:rgba(14,165,233,.2);--track:rgba(15,23,42,.1);--glow:rgba(14,165,233,.05);
  --cat-autoimmune:#7c3aed;--cat-neuro:#047857;--cat-vascular:#0369a1;--cat-mental:#be185d;--cat-cancer:#dc2626;--cat-metabolic:#c2410c;--cat-other:#475569;
}
body[data-font="sm"]{font-size:14px}
body[data-font="lg"]{font-size:17px}
.disclaimer{background:rgba(56,189,248,0.07);border-bottom:0.5px solid rgba(56,189,248,0.2);padding:9px 20px;text-align:center;font-size:11px;color:rgba(56,189,248,0.8);line-height:1.5}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:0.5px solid var(--border);flex-wrap:wrap;gap:10px;position:sticky;top:0;background:var(--topbar-bg);backdrop-filter:blur(12px);z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#a78bfa,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:700;letter-spacing:.04em;color:var(--strong)}
.logo-sub{font-size:10px;color:var(--dim);letter-spacing:.06em}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.lang-wrap,.font-wrap{display:flex;background:var(--control-bg);border:0.5px solid var(--border);border-radius:20px;overflow:hidden}
.lang-btn{padding:7px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;font-family:inherit;white-space:nowrap}
.lang-btn.active{background:var(--control-active);color:var(--purple)}
.view-controls{display:flex;gap:6px;align-items:center}
.theme-btn,.font-btn{border:none;background:transparent;color:var(--muted);font-family:inherit;font-weight:800;cursor:pointer;transition:all .2s}
.theme-btn{width:34px;height:34px;border-radius:50%;background:var(--control-bg);border:0.5px solid var(--border);font-size:15px}
.theme-btn.active,.font-btn.active{background:var(--control-active);color:var(--purple)}
.font-btn{min-width:34px;padding:7px 10px;font-size:12px}
.font-btn[data-size="lg"]{font-size:14px}
.btn{background:rgba(255,255,255,0.06);border:0.5px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;text-decoration:none}
.btn:hover{border-color:rgba(255,255,255,.2)}
.btn-print{background:rgba(56,189,248,.14);border-color:rgba(56,189,248,.28);color:#bae6fd}
.main{max-width:860px;margin:0 auto;padding:24px 16px 48px}
.login-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px}
.login-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px}
.input{background:rgba(255,255,255,0.06);border:0.5px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%}
.input:focus{border-color:var(--purple)}
.label{font-size:11px;color:var(--muted);margin-bottom:6px}
.login-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
.status{font-size:12px;color:var(--muted)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:42vh;gap:14px;text-align:center}
.empty-icon{font-size:48px;opacity:.5}
.empty-text{font-size:15px;color:var(--muted)}
.empty-hint{font-size:12px;color:var(--dim)}
.hero-top{text-align:center;padding:20px 0 12px}
.hero-greeting{font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.hero-id{font-size:26px;font-weight:800;color:var(--strong);margin-bottom:3px}
.hero-sub{font-size:12px;color:var(--dim)}
.hero-risk{background:var(--hero-panel);border:0.5px solid var(--hero-border);border-radius:18px;padding:20px 22px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.risk-label{font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.risk-big{font-family:'DM Mono',monospace;font-size:46px;font-weight:800;line-height:1;letter-spacing:-.02em}
.risk-name{font-size:15px;font-weight:500;color:var(--soft);margin-top:5px}
.apoe-label{font-size:10px;color:var(--dim);margin-bottom:5px;text-align:right}
.apoe-badge{background:rgba(167,139,250,.15);border:0.5px solid rgba(167,139,250,.4);border-radius:8px;padding:7px 16px;font-size:15px;font-weight:800;color:var(--purple);font-family:'DM Mono',monospace;display:inline-block}
.carrier{font-size:11px;color:var(--muted);margin-top:5px;text-align:right}
.gene-note{font-size:11px;color:var(--muted);line-height:1.55;margin-top:5px;max-width:320px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:18px}
.stat-card{background:rgba(255,255,255,.04);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px}
.stat-lbl{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);font-weight:500;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.2}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:18px;padding:20px 22px;margin-bottom:14px}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sh-icon{font-size:18px}
.sh-title{font-size:16px;font-weight:700;color:var(--strong)}
.sh-sub{font-size:11px;color:var(--dim);padding-left:26px;margin-bottom:12px}
.risk-item{border-radius:12px;border:0.5px solid var(--border);background:rgba(255,255,255,.02);margin-bottom:4px;cursor:pointer;transition:border-color .2s,background .2s}
.risk-item:hover{border-color:rgba(255,255,255,.18)}
.risk-item.open{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.06)}
.ri-header{padding:12px 14px;display:flex;align-items:center;gap:10px}
.ri-num{font-size:11px;color:var(--dim);min-width:18px;font-family:'DM Mono',monospace}
.ri-body{flex:1;min-width:0}
.ri-name-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.ri-name{font-size:14px;font-weight:600;color:var(--strong)}
.cat-badge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-track{flex:1;height:5px;background:var(--track);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.ri-mult{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;min-width:44px;text-align:right}
.ri-chevron{font-size:10px;color:var(--dim);margin-left:4px}
.ri-detail{padding:0 14px 14px 42px;border-top:0.5px solid rgba(167,139,250,.2)}
.ri-explain{font-size:13px;line-height:1.7;margin-top:10px}
.ri-advice{font-size:12px;color:var(--muted);margin-top:6px}
.tap-hint{font-size:11px;color:var(--dim);text-align:center;margin-top:8px}
.wgs-block{border-radius:12px;padding:14px 16px;margin-bottom:8px}
.wgs-title{font-size:12px;font-weight:600;margin-bottom:8px}
.cancer-tags{display:flex;flex-wrap:wrap;gap:6px}
.c-tag{background:rgba(248,113,113,.12);border-radius:8px;padding:6px 12px}
.c-name{font-size:13px;color:var(--strong);font-weight:600}
.c-mult{font-size:11px;color:var(--red);font-family:'DM Mono',monospace}
.nutr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.nutr-card{background:rgba(52,211,153,.07);border:0.5px solid rgba(52,211,153,.2);border-radius:12px;padding:12px 14px}
.nutr-name{font-size:13px;font-weight:700;color:#6ee7b7;margin-bottom:2px}
.nutr-level{font-size:10px;color:rgba(52,211,153,.6)}
.tab-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{flex:1;min-width:90px;background:rgba(255,255,255,.03);border:0.5px solid var(--border);border-radius:10px;padding:10px 8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;text-align:center;font-family:inherit}
.tab-btn.act-ex{background:rgba(56,189,248,.1);border-color:var(--blue);color:var(--blue)}
.tab-btn.act-diet{background:rgba(52,211,153,.1);border-color:var(--green);color:var(--green)}
.tab-btn.act-mon{background:rgba(251,146,60,.1);border-color:var(--orange);color:var(--orange)}
.tab-icon{font-size:16px;display:block;margin-bottom:2px}
.plan-sum{border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.6}
.plan-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px}
.plan-dot{width:5px;height:5px;border-radius:50%;margin-top:9px;flex-shrink:0}
.plan-text{font-size:13px;color:var(--soft);line-height:1.7}
.pgx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pgx-card{border-radius:12px;padding:12px;text-align:center}
.pgx-num{font-size:24px;font-weight:800;font-family:'DM Mono',monospace}
.pgx-unit{font-size:10px;opacity:.7;margin-top:1px}
.pgx-lbl{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.3}
.drug-wrap{margin-top:8px}
.drug-lbl{font-size:11px;color:var(--muted);margin-bottom:6px}
.drug-tags{display:flex;flex-wrap:wrap;gap:5px}
.drug-tag{background:rgba(251,191,36,.1);border:0.5px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 10px;font-size:11px;color:#fcd34d}
.drug-groups{display:grid;gap:10px}
.drug-group{border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;background:rgba(255,255,255,.025)}
.drug-group-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.drug-group-title{font-size:13px;font-weight:700;color:var(--strong)}
.drug-group-count{font-size:11px;color:var(--muted)}
.drug-group-list{display:grid;gap:8px}
.drug-item{border-radius:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.05)}
.drug-item-name{font-size:13px;font-weight:700;color:var(--strong);margin-bottom:4px}
.drug-toggle{margin-top:8px}
.link-btn{border:none;background:transparent;color:var(--blue);font:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:0}
.link-btn:hover{text-decoration:underline}
.allergy-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.al-lbl{font-size:12px;font-weight:600;margin-bottom:8px}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.food-tag{background:rgba(251,146,60,.1);border:0.5px solid rgba(251,146,60,.3);border-radius:20px;padding:4px 11px;font-size:12px;color:#fdba74}
.exp-tag{background:rgba(148,163,184,.08);border:0.5px solid rgba(148,163,184,.2);border-radius:20px;padding:4px 11px;font-size:12px;color:#cbd5e1}
.footer{text-align:center;padding:16px 0;border-top:0.5px solid rgba(255,255,255,.05)}
.footer-txt{font-size:10px;color:rgba(255,255,255,.2);margin-bottom:8px}
.fbadges{display:flex;justify-content:center;gap:7px;flex-wrap:wrap}
.fbadge{border-radius:20px;padding:3px 12px;font-size:10px;font-weight:600}
.glow{position:fixed;top:-300px;left:50%;transform:translateX(-50%);width:700px;height:600px;background:radial-gradient(ellipse,var(--glow) 0%,transparent 65%);pointer-events:none;z-index:0}
body.theme-light .card,body.theme-light .login-card,body.theme-light .stat-card,body.theme-light .risk-item,body.theme-light .drug-group,body.theme-light .drug-item{background:#fff}
body.theme-light .input,body.theme-light .btn{background:rgba(15,23,42,.045)}
body.theme-light .btn-print{background:rgba(2,132,199,.1);border-color:rgba(2,132,199,.25);color:var(--blue)}
body.theme-light .risk-item.open{background:rgba(14,165,233,.08);border-color:rgba(14,165,233,.28)}
body.theme-light .risk-item:hover{border-color:rgba(15,23,42,.2)}
body.theme-light .nutr-card{background:rgba(16,185,129,.08)}
body.theme-light .nutr-name{color:var(--green)}
body.theme-light .drug-tag{color:var(--amber)}
body.theme-light .c-tag{background:rgba(248,113,113,.12)}
body.theme-light .food-tag{background:rgba(251,146,60,.11);color:#c2410c}
body.theme-light .exp-tag{background:rgba(100,116,139,.09);color:#334155}
body.theme-light .wgs-muted-title{color:#475569 !important}
body[data-font="sm"] .sh-title{font-size:15px}
body[data-font="sm"] .ri-name,body[data-font="sm"] .risk-name,body[data-font="sm"] .nutr-name,body[data-font="sm"] .c-name,body[data-font="sm"] .drug-item-name{font-size:13px}
body[data-font="sm"] .sh-sub,body[data-font="sm"] .hero-sub,body[data-font="sm"] .ri-explain,body[data-font="sm"] .ri-advice,body[data-font="sm"] .plan-text,body[data-font="sm"] .plan-sum{font-size:12px}
body[data-font="lg"] .sh-title{font-size:19px}
body[data-font="lg"] .hero-id{font-size:30px}
body[data-font="lg"] .risk-big{font-size:52px}
body[data-font="lg"] .ri-name,body[data-font="lg"] .risk-name,body[data-font="lg"] .nutr-name,body[data-font="lg"] .c-name,body[data-font="lg"] .drug-item-name{font-size:16px}
body[data-font="lg"] .sh-sub,body[data-font="lg"] .hero-sub,body[data-font="lg"] .ri-explain,body[data-font="lg"] .ri-advice,body[data-font="lg"] .plan-text,body[data-font="lg"] .plan-sum{font-size:15px}
body[data-font="lg"] .food-tag,body[data-font="lg"] .exp-tag{font-size:14px}
.wrap{position:relative;z-index:1}
.print-only{display:none}
.print-pgx{display:none}
@media(max-width:820px){
  .main{padding:18px 14px 36px}
  .hero-risk{align-items:flex-start}
  .pgx-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .tab-row{display:grid;grid-template-columns:1fr 1fr 1fr}
}
@media(max-width:600px){
  body{font-size:14px}
  .topbar{padding:12px 14px;align-items:flex-start}
  .logo{width:100%}
  .controls{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .lang-wrap,.view-controls{grid-column:1/-1}
  .lang-btn,.font-btn{flex:1}
  .view-controls{display:grid;grid-template-columns:42px 1fr;align-items:stretch}
  .font-wrap{display:flex}
  .theme-btn{width:42px;height:42px}
  .controls>.btn{width:100%;text-align:center}
  .main{padding:14px 12px 28px}
  .login-card,.card{padding:16px}
  .login-grid{grid-template-columns:1fr}
  .login-actions{flex-direction:column;align-items:stretch}
  .login-actions .btn{width:100%}
  .hero-risk{flex-direction:column}
  .apoe-label,.carrier,.gene-note{text-align:left}
  .hero-top{padding-top:10px}
  .hero-id{font-size:22px}
  .risk-big{font-size:38px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat-card{padding:10px 12px}
  .stat-val{font-size:18px}
  .ri-header{padding:10px 12px}
  .ri-detail{padding:0 12px 12px 12px}
  .wgs-block{padding:12px}
  .nutr-grid{grid-template-columns:1fr 1fr}
  .tab-row{grid-template-columns:1fr}
  .tab-btn{min-width:0}
  .allergy-grid{grid-template-columns:1fr}
  .drug-tags,.tag-list,.cancer-tags{gap:6px}
  .footer{padding-bottom:4px}
}
@media(max-width:420px){
  .disclaimer{padding:8px 12px;font-size:10px}
  .logo-text{font-size:13px}
  .logo-sub{font-size:9px}
  .lang-btn{padding:7px 12px;font-size:11px}
  .btn{padding:8px 10px;font-size:12px}
  .sh-title{font-size:15px}
  .sh-sub{padding-left:0}
  .nutr-grid,.stat-grid{grid-template-columns:1fr}
  .c-tag,.food-tag,.exp-tag,.drug-tag{font-size:10px}
}
@media print{
  @page{size:auto;margin:10mm}
  :root{--bg:#ffffff;--bg2:#ffffff;--border:#dbe2ea;--text:#111827;--muted:#4b5563;--dim:#6b7280}
  *, *::before, *::after{box-shadow:none !important; text-shadow:none !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; color:#111827 !important; background-color:transparent !important}
  body{background:#fff !important;color:#111827 !important;font-size:11px;line-height:1.45}
  .glow,.topbar,.login-card,.disclaimer,.footer,.btn-print,#logout-btn,#pgx-print-section{display:none !important}
  .main{max-width:none;padding:0 0 8mm}
  .wrap{z-index:auto}
  .card,.hero-risk,.stat-card,.nutr-card,.pgx-card,.wgs-block,.drug-group,.c-tag,.food-tag,.exp-tag{background:#fff !important;border-color:#d1d5db !important}
  .card,.hero-risk{break-inside:avoid-page;page-break-inside:avoid}
  .risk-item,.drug-group,.stat-card,.nutr-card,.pgx-card{break-inside:avoid-page;page-break-inside:avoid}
  .risk-big{font-size:34px;color:#0f172a !important}
  .hero-id{font-size:20px;color:#0f172a !important}
  .hero-sub,.sh-sub,.stat-sub,.nutr-level,.ri-explain,.ri-advice,.c-mult,.footer-txt{color:#4b5563 !important}
  .sh-title,.risk-name,.nutr-name,.drug-item-name,.c-name{color:#0f172a !important}
  .bar-fill,.bar-fill2,.stack-seg,.plan-dot,.legend-dot{opacity:.85 !important}
  .badge,.cat-badge{color:#111827 !important}
  .tab-btn{border-color:#d1d5db !important;color:#111827 !important;background:#fff !important}
  .tab-btn.act-ex,.tab-btn.act-diet,.tab-btn.act-mon{border-color:#94a3b8 !important;color:#111827 !important;background:#f8fafc !important}
  .plan-sum,.drug-group,.wgs-block,.stat-card,.nutr-card{break-inside:avoid}
  .print-only{display:block !important}
  .print-only .print-head{border:1px solid #d1d5db;border-radius:12px;padding:12px 14px;margin-bottom:12px;background:#f8fafc}
  .print-only .print-title{font-size:16px;font-weight:800;color:#0f172a;margin-bottom:2px}
  .print-only .print-sub{font-size:11px;color:#475569}
  .print-only .print-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:#334155}
  .print-only .print-meta span{color:#334155 !important}
  .print-only .print-gene-note{font-size:10px;color:#475569;line-height:1.5;margin-top:6px}
  .print-pgx{display:block !important}
  .print-pgx .print-pgx-head{font-size:12px;font-weight:800;color:#0f172a;margin:10px 0 6px}

function dn(name){
  const text = String(name || '').trim();
  if (currentLang === 'TH' && DTH[text]) return `${DTH[text]} (${text})`;
  if (currentLang === 'EN' && hasThai(text)) return 'Risk item';
  return text;
}
function rawDiseaseLabel(name){
  const text = String(name || '').trim();
  if (!text) return '';
  if (currentLang === 'TH' && DTH[text]) return `${DTH[text]} (${text})`;
  if (currentLang === 'EN' && hasThai(text)) return 'genetic finding';
  return text;
}
function wn(name){
  const text = String(name || '').trim();
  if (currentLang === 'TH' && WGS_TH[text]) return `${WGS_TH[text]} (${text})`;
  if (currentLang === 'EN' && hasThai(text)) return 'Genomic finding';

}
function nn(name){
  const text = String(name || '').trim();
  if (currentLang === 'TH' && NUTRIENT_TH[text]) return `${NUTRIENT_TH[text]} (${text})`;

function iname(name){

function apoeSummary(genotype){
  const gt = String(genotype || '').trim() || 'ε3/ε3';
  if (currentLang === 'TH') return `${gt}: ${t('apoeNote')}`;
  return `${gt}: ${t('apoeNote')}`;
}
function carrierSummary(raw){
  const text = String(raw || '').trim();
  if (!text) return t('noCarrier');
  if (currentLang === 'EN' && hasThai(text)) {
    if (/ไม่พบ|ไม่มี/.test(text)) return t('noCarrier');
    if (/พาหะ/.test(text)) return `Carrier status noted. ${t('carrierNote')}`;
    return `Genetic finding noted. ${t('wgsNote')}`;
  }
  const [diseaseRaw] = text.split(':');
  const disease = String(diseaseRaw || '').trim() || text;
  const label = rawDiseaseLabel(disease);
  const lower = text.toLowerCase();
  const isCarrier = /carrier|พาหะ|risk alleles/.test(lower);
  if (currentLang === 'TH') {
    if (isCarrier) return `พบว่าเป็นพาหะของ ${label} โดยทั่วไปไม่ทำให้ป่วย. ${t('carrierNote')}`;
    return `พบข้อมูลยีน ${label} ${t('wgsNote')}`;
  }
  if (isCarrier) return `Carrier of ${label}; usually not an active disease. ${t('carrierNote')}`;
  return `Genetic finding: ${label}. ${t('wgsNote')}`;
}
function findingSummary(raw){
  const text = String(raw || '').trim();
  if (!text) return t('noData');
  if (currentLang === 'EN' && hasThai(text)) return `Genomic finding noted. ${t('wgsNote')}`;
  if (currentLang === 'TH') return `${text}. ${t('wgsNote')}`;
  return `${text}. ${t('wgsNote')}`;
}
function mc(m){ return m>=10?"#f87171":m>=5?"#fb923c":m>=3?"#fbbf24":"#34d399"; }
function getCat(n){
  const l = String(n || '').toLowerCase();
  if(/cancer|carcinoma|lymphoma|leukemia|melanoma|neuroblastoma|neoplasm/.test(l))return"cancer";
  if(/diabetes|gout|thyroid|metabolic|obesity|hypertriglyceridemia/.test(l))return"metabolic";
  if(/lupus|sclero|sjögren|celiac|crohn|colitis|psoriasis|alopecia|vitiligo|kawasaki|sarcoid|autoimmune|urticaria|atopic|dermatitis|hepatitis|biliary|hashimoto/.test(l))return"autoimmune";
  if(/stroke|cardiac|heart|vascular|thrombo|hypertension|aneurysm|aortic|coronary|myocardial/.test(l))return"vascular";
  if(/parkinson|alzheimer|sclerosis|als|epilepsy|tremor|dementia|macular|glaucoma|sleep apnea|palsy/.test(l))return"neuro";
  if(/depression|bipolar|schizophrenia|adhd|anxiety|mental/.test(l))return"mental";
  return"other";
}
function parseLines(raw){
  return String(raw || '')

    .map(s=>s.replace(/<[^>]+>/g,"").trim())
    .filter(Boolean)
    .slice(0,8);
}

}

function getTopRiskSummary(risks){
  const ordered = [...risks].sort((a,b)=>Number(a.rank_order)-Number(b.rank_order));
  const allRisks = ordered.map(item => ({
    name: item.disease_name,
    mult: Number(item.multiplier || 0)
  }));
  return {
    allRisks,
    topRisk: allRisks[0] || { name: '-', mult: 0 }
  };
}

function splitPgx(pgx){
  const ae = pgx.filter(row => row.risk_type === 'adverse_effect');
  const eff = pgx.filter(row => row.risk_type === 'insufficient_efficacy');
  const dose = pgx.filter(row => row.risk_type === 'dose_reduction');
  return { ae, eff, dose };
}

    ['มี cardiac/vascular risk', 'there is cardiac/vascular risk'],
    ['เริ่มจาก moderate-intensity', 'start with moderate intensity'],
    ['เพิ่มระดับช้า', 'increase intensity gradually'],
    ['ควรตรวจ/ปรึกษาแพทย์ก่อน HIIT หรือการแข่งขันหนัก', 'seek medical review before HIIT or intense competition'],
    ['ใช้แนวทาง Mediterranean/DASH', 'Use the Mediterranean/DASH approach'],
    ['ผัก-ผลไม้หลากสี', 'a variety of vegetables and fruits'],
    ['โปรตีนไม่ติดมัน/ปลา', 'lean protein/fish'],
    ['ลดน้ำตาล/refined carb, trans/saturated fat, processed meat และโซเดียม', 'reduce sugar/refined carbs, trans/saturated fat, processed meat, and sodium'],
    ['ควรงด/จำกัดแอลกอฮอล์', 'avoid or strictly limit alcohol'],
    ['เน้น low-sodium diet และวัด BP', 'focus on a low-sodium diet and monitor blood pressure'],
    ['จัด plate method, โปรตีนพอเหมาะ, fiber สูง, งดเครื่องดื่มหวาน; ติดตาม glucose/lipid/liver enzyme', 'use the plate method, keep protein appropriate, increase fibre, avoid sugary drinks, and track glucose/lipids/liver enzymes'],
    ['สารอาหารที่ควรให้ความสำคัญ', 'Nutrients to focus on'],
    ['พบ thalassemia ใน WGS', 'Thalassemia flagged in WGS'],
    ['ตรวจ CBC/Hb typing/ferritin ก่อนเสริมธาตุเหล็ก', 'check CBC/Hb typing/ferritin before taking iron supplements'],
    ['พื้นฐานทุกปี', 'Annual baseline checks'],
    ['ทบทวนยาโดยเภสัชกร/แพทย์พร้อม PGx', 'review medicines with a pharmacist/doctor together with PGx'],
    ['พิจารณา ASCVD risk score, ECG ตามอายุ/อาการ', 'consider ASCVD risk scoring and ECG based on age/symptoms'],
    ['ประเมิน baseline cognition, sleep apnea/sleep quality, คุม BP/lipid/glucose และหลีกเลี่ยง smoking/alcohol', 'check baseline cognition and sleep quality, control BP/lipids/glucose, and avoid smoking/alcohol'],
    ['ทำ age-appropriate screening', 'perform age-appropriate screening'],
    ['ตามดุลยพินิจแพทย์', 'as advised by your doctor'],
    ['ให้คำปรึกษาคู่ครอง/ครอบครัวถ้าจะมีบุตร', 'seek partner/family counselling if planning a pregnancy']
  ]);
  if (hasThai(localized)) return PLAN_FALLBACK_EN[kind] || 'Review this item with your clinician.';
  return localized;
}

function render(){
  const data = currentData;
  const isTH = currentLang === 'TH';
  const riskInfo = getTopRiskSummary(data.risks || []);
  const allRisks = riskInfo.allRisks;
  const topRisk = riskInfo.topRisk;
  const max = allRisks[0]?.mult || 1;
  const tc = mc(topRisk.mult || 0);
  const pgxGroups = splitPgx(data.pgx || []);
  const totalPgx = pgxGroups.ae.length + pgxGroups.eff.length + pgxGroups.dose.length;
  const patientLabel = languageSafeText(data.patient.display_name, '');
  const patientNote = languageSafeText(data.patient.portal_note, '');

  let h = `<div class="hero-top">
    <div class="hero-greeting">${t('greeting')}</div>
    <div class="hero-id">${t('participant')} ${data.participantNo}</div>
    ${patientLabel ? `<div class="hero-sub" style="color:var(--strong);font-weight:700">${patientLabel}</div>` : ""}
    ${patientNote ? `<div class="hero-sub">${patientNote}</div>` : ""}
    <div class="hero-sub">${t('researchOnly')}</div>
  </div>
  <div class="print-only">
    <div class="print-head">
      <div class="print-title">DNA Personal Risk Dashboard</div>
      <div class="print-sub">${currentLang === 'TH' ? 'รายงานสำหรับผู้ป่วยแบบพิมพ์อ่านง่าย' : 'Printable patient summary'}</div>
      <div class="print-meta">
        <span>${t('participant')} ${data.participantNo}</span>
        <span>${data.patient.apoe_genotype || 'ε3/ε3'}</span>
        <span>${t('highestRisk')} ${dn(topRisk.name || '-')} ${Number(topRisk.mult || 0).toFixed(2)}×</span>
      </div>
      <div class="print-gene-note">${apoeSummary(data.patient.apoe_genotype || 'ε3/ε3')}</div>
      <div class="print-gene-note">${carrierSummary(data.patient.genetic_diseases)}</div>
    </div>
  </div>
  <div class="print-pgx">
    <div class="print-pgx-head">${t('pgxTitle')}</div>
    <div class="print-pgx-grid">
      ${[
        { key: 'ae', label: t('ae'), color: '#991b1b', border: '#fecaca', rows: pgxGroups.ae },
        { key: 'eff', label: t('eff'), color: '#92400e', border: '#fcd34d', rows: pgxGroups.eff },
        { key: 'dose', label: t('dose'), color: '#075985', border: '#7dd3fc', rows: pgxGroups.dose }
      ].map(group => `
        <div class="print-pgx-card">
          <div class="print-pgx-title" style="color:${group.color}">${group.label}</div>
          <div class="print-pgx-count">${group.rows.length} ${t('items')}</div>
          <div class="print-pgx-list">
            ${group.rows.length ? group.rows.map(row => {
              const desc = pgxShortDescription(row);
              return `<div class="print-pgx-item">${pgxDrugName(row)}${desc ? ` - ${desc}` : ''}</div>`;
            }).join('') : `<div class="print-pgx-item">${t('noData')}</div>`}
          </div>
        </div>
      `).join('')}
    </div>
  </div>
  <div class="hero-risk">
    <div>
      <div class="risk-label">${t('highestRisk')}</div>
      <div class="risk-big" style="color:${tc}">${Number(topRisk.mult || 0).toFixed(2)}×</div>
      <div class="risk-name">${dn(topRisk.name || '-')}</div>
    </div>
    <div>
      <div class="apoe-label">${t('apoe')}</div>
      <div class="apoe-badge">${data.patient.apoe_genotype || "ε3/ε3"}</div>
      ${patientLabel ? `<div class="gene-note">${patientLabel}</div>` : ""}
      ${patientNote ? `<div class="gene-note">${patientNote}</div>` : ""}
      <div class="gene-note">${apoeSummary(data.patient.apoe_genotype || 'ε3/ε3')}</div>
      <div class="carrier">🧬 ${displayCarrierText(data.patient.genetic_diseases)}</div>
      <div class="gene-note">${carrierSummary(data.patient.genetic_diseases)}</div>
    </div>
  </div>`;

  h += `<div class="stat-grid">
    <div class="stat-card"><div class="stat-lbl">${t('nutrition')}</div><div class="stat-val" style="color:var(--green)">${data.nutrition.length}</div><div class="stat-sub">${t('nutritionSub')}</div></div>
    <div class="stat-card"><div class="stat-lbl">${t('cancer')}</div><div class="stat-val" style="color:var(--red)">${data.cancer.length}</div><div class="stat-sub">${t('cancerSub')}</div></div>
    <div class="stat-card"><div class="stat-lbl">${t('pgx')}</div><div class="stat-val" style="color:var(--amber)">${totalPgx}</div><div class="stat-sub">${t('pgxSub')}</div></div>
    <div class="stat-card"><div class="stat-lbl">${t('riskCount')}</div><div class="stat-val" style="color:var(--purple)">${allRisks.length}</div><div class="stat-sub">${t('riskCountSub')}</div></div>
  </div>`;

  const riskRows = allRisks.map((item,i)=>{
    const cat = getCat(item.name);
    const c = CATS[cat];
    const pct = Math.min(item.mult / max * 100, 100);
    const col = mc(item.mult);
    const isO = openR === i;
    const catLbl = isTH ? c.th : c.en;
    const exp = expl(item.name);
    const adv = isTH ? (item.mult>=10?t('urgent'):item.mult>=3?t('monitor'):t('prevent')) : (item.mult>=10?t('urgent'):item.mult>=3?t('monitor'):t('prevent'));
    return `<div class="risk-item${isO?" open":""}" onclick="toggleR(${i})">
      <div class="ri-header">
        <span class="ri-num">#${i+1}</span>
        <div class="ri-body">
          <div class="ri-name-row">
            <span class="ri-name">${dn(item.name)}</span>
            <span class="cat-badge" style="background:${c.bg};border:0.5px solid ${c.border};color:${c.text}">${catLbl}</span>
          </div>
          <div class="bar-row">
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
            <span class="ri-mult" style="color:${col}">${item.mult.toFixed(2)}×</span>
          </div>
        </div>
        <span class="ri-chevron">${isO?"▲":"▼"}</span>
      </div>
      ${isO?`<div class="ri-detail">
        <div class="ri-explain" style="color:${c.text}">💬 ${exp || t('genericRisk')}</div>
        <div class="ri-advice">${t('riskHigher')} <strong style="color:${col}">${item.mult.toFixed(2)}×</strong> — ${adv}</div>
      </div>`:""}
    </div>`;
  }).join("");

  h += `<div class="card">
    <div class="sh"><span class="sh-icon">📊</span><span class="sh-title">${t('riskProfile')}</span></div>
    <div class="sh-sub">${t('riskProfileSub')}</div>
    ${riskRows || `<div class="empty-text">${t('noData')}</div>`}
    <div class="tap-hint">${t('tapHint')}</div>
  </div>`;

  const cancerH = data.cancer.length
    ? data.cancer.map(c=>`<div class="c-tag"><div class="c-name">${wn(c.cancer_type)}</div><div class="c-mult">${c.multiplier ? `${Number(c.multiplier).toFixed(2)}×` : ''}</div></div>`).join("")
    : `<span style="font-size:13px;color:var(--muted)">${t('noCancer')}</span>`;
  h += `<div class="card">
    <div class="sh"><span class="sh-icon">🔬</span><span class="sh-title">${t('wgs')}</span></div>
    <div class="sh-sub">${t('wgsSub')}</div>
    <div class="wgs-block" style="background:rgba(248,113,113,.07);border:0.5px solid rgba(248,113,113,.2)">
      <div class="wgs-title" style="color:var(--red)">🎗️ ${t('cancerFlags')}</div>
      <div class="cancer-tags">${cancerH}</div>
      ${data.cancer.length?`<div style="font-size:11px;color:var(--muted);margin-top:8px">💬 ${t('cancerNote')}</div>`:""}
    </div>
    <div class="wgs-block" style="background:rgba(56,189,248,.07);border:0.5px solid rgba(56,189,248,.2)">
      <div class="wgs-title" style="color:var(--blue)">❤️ ${t('heartFlags')}</div>
      <div style="font-size:13px;color:var(--text)">${displayFindingText(data.patient.wgs_heart, t('noHeart'))}</div>
      ${data.patient.wgs_heart ? `<div class="gene-note">${findingSummary(data.patient.wgs_heart)}</div>` : ""}
    </div>
    ${data.patient.wgs_other ? `<div class="wgs-block" style="background:rgba(148,163,184,.07);border:0.5px solid rgba(148,163,184,.15)">
      <div class="wgs-title wgs-muted-title" style="color:#cbd5e1">🧬 ${t('other')}</div>
      <div style="font-size:13px;color:var(--soft);line-height:1.6">${displayFindingText(data.patient.wgs_other, t('noData'))}</div>
      <div class="gene-note">${findingSummary(data.patient.wgs_other)}</div>
    </div>` : ""}
  </div>`;

  const nCards = data.nutrition.map(n=>`<div class="nutr-card">
    <div class="nutr-name">${nn(n.nutrient)}</div>
    <div class="nutr-level">${n.need_level === "High" ? t('highNeed') : t('slightNeed')}</div>
  </div>`).join("");
  h += `<div class="card">
    <div class="sh"><span class="sh-icon">🥗</span><span class="sh-title">${t('nutrients')}</span></div>
    <div class="sh-sub">${t('nutrientsSub')}</div>
    <div class="nutr-grid">${nCards || `<span style="color:var(--muted);font-size:12px">${t('noData')}</span>`}</div>
  </div>`;

  const exL = parseLines(data.patient.exercise_plan);
  const dL = parseLines(data.patient.diet_plan);
  const mL = parseLines(data.patient.monitoring_plan);
  const mkItems = (lines,dot,key)=>lines.map(l=>`<div class="plan-item"><div class="plan-dot" style="background:${dot}"></div><div class="plan-text">${localizePlanLine(l,key)}</div></div>`).join("");
  const tabs = [
    {key:"ex",icon:"🏃",label:t('ex'),col:"var(--blue)",items:exL,sum:t('exSum')},
    {key:"diet",icon:"🥗",label:t('diet'),col:"var(--green)",items:dL,sum:t('dietSum')},
    {key:"mon",icon:"🏥",label:t('mon'),col:"var(--orange)",items:mL,sum:t('monSum')}
  ];
  const tabBtns = tabs.map(ti=>`<button class="tab-btn${activeTab===ti.key?" act-"+ti.key:""}" onclick="switchTab('${ti.key}')"><span class="tab-icon">${ti.icon}</span>${ti.label}</button>`).join("");
  const tabPanels = tabs.map(ti=>{
    const sumC = ti.key==="ex"?"rgba(56,189,248,.08)":ti.key==="diet"?"rgba(52,211,153,.08)":"rgba(251,146,60,.08)";
    const sumB = ti.key==="ex"?"rgba(56,189,248,.25)":ti.key==="diet"?"rgba(52,211,153,.25)":"rgba(251,146,60,.25)";
    return `<div id="tp-${ti.key}" style="display:${activeTab===ti.key?"block":"none"}">
      <div class="plan-sum" style="background:${sumC};border:0.5px solid ${sumB}">
        <span style="font-weight:600;color:${ti.col}">📌 ${t('sum')}</span>
        <span style="color:var(--soft)">${ti.sum}</span>
      </div>
      ${mkItems(ti.items,ti.col,ti.key)}
    </div>`;
  }).join("");
  h += `<div class="card">
    <div class="sh"><span class="sh-icon">💪</span><span class="sh-title">${t('plan')}</span></div>
    <div class="tab-row">${tabBtns}</div>
    ${tabPanels}
  </div>`;

  const pgxSections = [
    { key: 'ae', label: t('ae'), rows: pgxGroups.ae, style: 'rgba(248,113,113,.1)', border: 'rgba(248,113,113,.3)', text: 'var(--red)' },
    { key: 'eff', label: t('eff'), rows: pgxGroups.eff, style: 'rgba(251,191,36,.1)', border: 'rgba(251,191,36,.3)', text: 'var(--amber)' },
    { key: 'dose', label: t('dose'), rows: pgxGroups.dose, style: 'rgba(56,189,248,.1)', border: 'rgba(56,189,248,.3)', text: 'var(--blue)' }
  ];
  const pgxGroupHtml = pgxSections
    .filter(section => section.rows.length)
    .map(section => {
      const isExpanded = expandedDrugGroups[section.key];
      const visibleRows = isExpanded ? section.rows : section.rows.slice(0, 6);
      const hiddenCount = Math.max(section.rows.length - visibleRows.length, 0);
      const items = visibleRows.map(row => `
        <div class="drug-item">
          <div class="drug-item-name" style="color:${section.text}">${pgxDrugName(row)}</div>
        </div>
      `).join("");
      return `
        <div class="drug-group" style="background:${section.style};border-color:${section.border}">
          <div class="drug-group-head">
            <div>
              <div class="drug-group-title" style="color:${section.text}">${section.label}</div>
              <div class="drug-group-count">${section.rows.length} ${t('items')}</div>
            </div>
          </div>
          <div class="drug-group-list">${items}</div>
          ${hiddenCount > 0 ? `<div class="drug-toggle"><button class="link-btn" onclick="toggleDrugGroup('${section.key}')">${t('showMore')} +${hiddenCount}</button></div>` : ''}
          ${isExpanded && section.rows.length > 6 ? `<div class="drug-toggle"><button class="link-btn" onclick="toggleDrugGroup('${section.key}')">${t('showLess')}</button></div>` : ''}
        </div>
      `;
    }).join("");
  h += `<div class="card" id="pgx-print-section">
    <div class="sh"><span class="sh-icon">💊</span><span class="sh-title">${t('pgxTitle')}</span></div>
    <div class="sh-sub">${t('pgxSub2')}</div>
    <div class="pgx-grid">
      <div class="pgx-card" style="background:rgba(248,113,113,.1);border:0.5px solid rgba(248,113,113,.3)">
        <div class="pgx-num" style="color:var(--red)">${pgxGroups.ae.length}</div>
        <div class="pgx-unit" style="color:var(--red)">${t('items')}</div>
        <div class="pgx-lbl">${t('ae')}</div>
      </div>
      <div class="pgx-card" style="background:rgba(251,191,36,.1);border:0.5px solid rgba(251,191,36,.3)">
        <div class="pgx-num" style="color:var(--amber)">${pgxGroups.eff.length}</div>
        <div class="pgx-unit" style="color:var(--amber)">${t('items')}</div>
        <div class="pgx-lbl">${t('eff')}</div>
      </div>
      <div class="pgx-card" style="background:rgba(56,189,248,.1);border:0.5px solid rgba(56,189,248,.3)">
        <div class="pgx-num" style="color:var(--blue)">${pgxGroups.dose.length}</div>
        <div class="pgx-unit" style="color:var(--blue)">${t('items')}</div>
        <div class="pgx-lbl">${t('dose')}</div>
      </div>
    </div>
    ${pgxGroupHtml ? `<div class="drug-wrap"><div class="drug-lbl">${t('allPgxDrugs')}</div><div class="drug-groups">${pgxGroupHtml}</div></div>` : ""}
  </div>`;

  const fTags = data.food.filter(f=>f.item_type==='food').map(f=>`<span class="food-tag">${iname(f.item_name)}</span>`).join("") || `<span style="color:var(--muted);font-size:12px">${t('noData')}</span>`;
  const eTags = data.food.filter(f=>f.item_type!=='food').map(f=>`<span class="exp-tag">${iname(f.item_name)}</span>`).join("") || `<span style="color:var(--muted);font-size:12px">${t('noData')}</span>`;
  h += `<div class="card">
    <div class="sh"><span class="sh-icon">🌿</span><span class="sh-title">${t('allergy')}</span></div>
    <div class="allergy-grid">
      <div><div class="al-lbl" style="color:var(--orange)">🍴 ${t('foodRisk')}</div><div class="tag-list">${fTags}</div></div>
      <div><div class="al-lbl" style="color:var(--muted)">⚠️ ${t('envRisk')}</div><div class="tag-list">${eTags}</div></div>
    </div>
  </div>`;

  h += `<div class="footer">
    <div class="footer-txt">${t('footer')}</div>
    <div class="fbadges">
      <span class="fbadge" style="background:rgba(52,211,153,.1);border:0.5px solid rgba(52,211,153,.25);color:var(--green)">🔒 ${t('pdpa')}</span>
      <span class="fbadge" style="background:rgba(167,139,250,.1);border:0.5px solid rgba(167,139,250,.25);color:var(--purple)">🧬 ${t('researchBadge')}</span>
    </div>
  </div>`;

  document.getElementById('dash').innerHTML = h;
  document.getElementById('dash').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
}

function toggleR(i){ openR = openR === i ? null : i; render(); }
function switchTab(ti){ activeTab = ti; render(); }
function printPatient(){ window.print(); }
function toggleDrugGroup(key){ expandedDrugGroups[key] = !expandedDrugGroups[key]; render(); }

async function patientLogin() {
  const participantNo = Number(document.getElementById('participant-no').value);
  const password = document.getElementById('participant-password').value;
  const status = document.getElementById('portal-status');
  status.textContent = '...';
  try {
    await apiFetch('/api/patient/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ participantNo, password })
    });
    await loadPortalData();
  } catch (error) {
    status.textContent = error.message;
  }
}

async function patientLogout() {
  try {
    await fetch('/api/patient/logout', { method: 'POST' });
  } finally {
    currentData = null;
    openR = null;
    activeTab = 'ex';
    expandedDrugGroups = { ae: false, eff: false, dose: false };
    document.getElementById('dash').style.display = 'none';
    document.getElementById('empty').style.display = 'flex';
    document.getElementById('portal-status').textContent = t('notSigned');
    document.getElementById('participant-password').value = '';
  }
}

async function loadPortalData() {
  const data = await apiFetch('/api/patient/data');
  currentData = data;
  expandedDrugGroups = { ae: false, eff: false, dose: false };
  document.getElementById('participant-no').value = data.participantNo;
  document.getElementById('portal-status').textContent = `${t('signedIn')} ${data.participantNo}`;
  render();
}

async function checkExistingSession() {
  initDisplayPrefs();
  setStaticText();
  const participant = queryParam('participant');
  if (participant) document.getElementById('participant-no').value = participant;
  document.getElementById('portal-status').textContent = t('notSigned');
  document.getElementById('participant-password').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') patientLogin();
  });
  try {
    await fetch('/api/patient/logout', { method: 'POST' });
  } catch {}
}

window.onload = checkExistingSession;
</script>
